<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>YCode Editor</title>
  <link rel="stylesheet" href="node_modules/@xterm/xterm/css/xterm.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="m-0 p-0 overflow-hidden font-sans bg-ycode-dark text-ycode-text">
  
  <div id="toolbar" class="bg-ycode-darker p-2.5 flex gap-2.5 items-center border-b border-ycode-border">
    <button id="openBtn" class="btn">Open File</button>
    <button id="saveBtn" class="btn">Save File</button>
    <button id="runBtn" class="btn bg-ycode-green hover:bg-[#4caf50]">▶ Run Code</button>
    <button id="terminalBtn" class="btn bg-[#6366f1] hover:bg-[#818cf8]">Terminal</button>
    <button id="agentBtn" class="btn bg-ycode-purple hover:bg-[#a855f7]">🤖 Agent</button>
    <span id="filename" class="text-ycode-text p-2 text-[13px] flex-grow">No file open</span>
  </div>
  
  <div id="container" class="w-screen" style="height: calc(100vh - 200px);"></div>
  
  <div id="outputPanel" class="fixed bottom-0 left-0 right-0 h-[150px] bg-ycode-dark border-t border-ycode-border hidden flex-col">
    <div id="outputHeader" class="panel-header">
      <span id="outputTitle" class="text-ycode-text text-xs font-bold">Output</span>
      <button id="closeOutput" class="btn bg-ycode-red hover:bg-[#e85d6d] py-1 px-3 text-[11px]">Close</button>
    </div>
    <div id="outputContent" class="flex-grow p-2.5 overflow-auto text-ycode-text font-mono text-[13px] whitespace-pre-wrap"></div>
  </div>
  
  <div id="terminalPanel" class="fixed bottom-0 left-0 right-0 h-[200px] bg-ycode-dark border-t border-ycode-border hidden flex-col">
    <div id="terminalHeader" class="panel-header">
      <span id="terminalTitle" class="text-ycode-text text-xs font-bold">Terminal</span>
      <div id="terminalToolbar" class="flex gap-1">
        <button id="closeTerminal" class="btn bg-ycode-red hover:bg-[#e85d6d] py-1 px-3 text-[11px]">Close</button>
      </div>
    </div>
    <div id="terminalContainer" class="flex-grow p-1 overflow-hidden">
      <div id="terminal" class="h-full"></div>
    </div>
  </div>

  <div id="agentPanel" class="fixed right-0 top-[48px] bottom-0 w-[300px] bg-ycode-dark border-l border-ycode-border hidden flex-col z-50">
    <div id="agentHeader" class="panel-header">
      <span id="agentTitle" class="text-ycode-text text-xs font-bold">AI Agent</span>
      <button id="closeAgent" class="bg-transparent text-[#ccc] border-none cursor-pointer">✖</button>
    </div>
    <div id="agentChat" class="flex-grow p-2.5 overflow-y-auto text-[#ccc] text-[13px] flex flex-col gap-2.5"></div>
    <div id="agentStatus" class="p-1 px-2.5 text-[11px] text-[#888] italic border-t border-[#333]">Idle</div>
    <div id="agentInputContainer" class="flex p-2.5 border-t border-ycode-border">
      <input type="text" id="agentInput" class="flex-grow bg-[#3c3c3c] text-white border border-[#555] p-1.5 rounded-[3px]" placeholder="Ask agent..." />
      <button id="agentSubmit" class="btn ml-1 py-1.5 px-3">Send</button>
    </div>
  </div>

  <div id="approvalToast" class="fixed top-5 left-1/2 -translate-x-1/2 w-[80vw] max-w-[800px] bg-ycode-darker border border-[#007acc] shadow-lg p-4 rounded-md z-[1000] hidden flex-col gap-2.5 text-[#ccc] max-h-[80vh]">
    <div><strong>Agent is requesting permission to run:</strong></div>
    <div id="approvalCommand" class="font-mono bg-ycode-dark p-2 rounded whitespace-pre-wrap overflow-y-auto max-h-[60vh] text-[12px]"></div>
    <div class="flex gap-2.5 justify-end">
      <button id="btnDeny" class="btn bg-ycode-red hover:bg-[#e85d6d]">Deny</button>
      <button id="btnApprove" class="btn bg-ycode-green hover:bg-[#4caf50]">Approve</button>
    </div>
  </div>

  <script src="node_modules/monaco-editor/min/vs/loader.js"></script>
  <script src="node_modules/@xterm/xterm/lib/xterm.js"></script>
  <script src="monaco-lsp-client.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
