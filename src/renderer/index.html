<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>YCode Editor</title>
  <link rel="stylesheet" href="../../node_modules/@xterm/xterm/css/xterm.css" />
  <link rel="stylesheet" href="../../styles/styles.css" />
</head>
<body>
  
  <div id="toolbar" class="toolbar">
    <button id="openBtn" class="btn">Open File</button>
    <button id="saveBtn" class="btn">Save File</button>
    <button id="runBtn" class="btn-run">▶ Run Code</button>
    <button id="terminalBtn" class="btn-terminal">Terminal</button>
    <button id="agentBtn" class="btn-agent">🤖 Agent</button>
    <span id="filename" class="toolbar-filename">No file open</span>
  </div>
  
  <div id="container" class="w-screen" style="height: calc(100vh - 200px);"></div>
  
  <div id="outputPanel" class="output-panel">
    <div id="outputHeader" class="panel-header">
      <span id="outputTitle" class="panel-title">Output</span>
      <button id="closeOutput" class="btn-close-panel">Close</button>
    </div>
    <div id="outputContent" class="output-content"></div>
  </div>
  
  <div id="terminalPanel" class="terminal-panel">
    <div id="terminalHeader" class="panel-header">
      <span id="terminalTitle" class="panel-title">Terminal</span>
      <div id="terminalToolbar" class="flex gap-1">
        <button id="closeTerminal" class="btn-close-panel">Close</button>
      </div>
    </div>
    <div id="terminalContainer" class="terminal-container">
      <div id="terminal" class="h-full"></div>
    </div>
  </div>

  <div id="agentPanel" class="agent-panel">
    <div id="agentHeader" class="agent-header">
      <div class="flex items-center gap-2">
        <div class="agent-status-indicator"></div>
        <span id="agentTitle" class="agent-title">YCode Sentinel</span>
      </div>
      <div class="flex gap-3 items-center">
        <select id="agentModelSelect" class="agent-select">
          <option value="gpt-4o">gpt-4o</option>
          <option value="gpt-3.5-turbo">gpt-3.5-turbo</option>
          <option value="claude-3-opus-20240229">claude-3</option>
          <option value="llama3-8b-8192">llama3</option>
        </select>
        <button id="btnAgentSettings" class="agent-icon-btn" title="Settings">⚙️</button>
        <button id="btnAgentSummarize" class="agent-icon-btn" title="Summarize">📝</button>
        <button id="btnAgentClear" class="agent-icon-btn" title="Clear">🗑️</button>
        <button id="closeAgent" class="agent-icon-btn">✖</button>
      </div>
    </div>
    
    <div id="agentChat" class="agent-chat-container">
      <!-- Welcome Message -->
      <div class="agent-welcome-bubble">
        <p class="text-ycode-blue font-bold mb-1">Hello, Chief.</p>
        <p class="text-[#888]">I'm your autonomous co-pilot. How can we improve the codebase today?</p>
      </div>
    </div>

    <div id="agentStatus" class="agent-status-bar">Status: Idle</div>
    
    <div class="agent-input-container">
      <div id="agentCommandMenu" class="agent-command-menu"></div>
      
      <div id="agentInputContainer" class="flex gap-2">
        <input type="text" id="agentInput" class="agent-input" placeholder="Type / for commands..." autocomplete="off" />
        <button id="agentSubmit" class="agent-submit-btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M15.854.146a.5.5 0 0 1 .11.54l-5.819 14.547a.75.75 0 0 1-1.329.124l-3.178-4.995L.643 7.184a.75.75 0 0 1 .124-1.33L15.314.037a.5.5 0 0 1 .54.11ZM6.636 10.07l2.761 4.338L14.13 2.576zm6.787-8.201L1.591 6.602l4.339 2.76z"/></svg>
        </button>
      </div>
    </div>
  </div>

  <div id="approvalToast" class="approval-toast">
    <div><strong>Agent is requesting permission to run:</strong></div>
    <div id="approvalCommand" class="font-mono bg-ycode-dark p-2 rounded whitespace-pre-wrap overflow-y-auto max-h-[60vh] text-[12px]"></div>
    <div class="flex gap-2.5 justify-end">
      <button id="btnDeny" class="btn-deny">Deny</button>
      <button id="btnApprove" class="btn-approve">Approve</button>
    </div>
  </div>

  <div id="agentSettingsModal" class="modal-overlay">
    <div class="modal-content">
      <h3 class="mt-0 mb-4 text-sm font-bold">Agent Settings</h3>
      <div class="flex flex-col gap-3">
        <div>
          <label class="block text-xs mb-1">API Key</label>
          <input type="password" id="agentApiKey" class="modal-input" placeholder="sk-..." />
        </div>
        <div>
          <label class="block text-xs mb-1">Base URL (Optional)</label>
          <input type="text" id="agentBaseUrl" class="modal-input" placeholder="https://api.openai.com/v1" />
        </div>
      </div>
      <div class="flex gap-2.5 justify-end mt-5">
        <button id="btnCancelSettings" class="btn-cancel">Cancel</button>
        <button id="btnSaveSettings" class="btn-approve">Save</button>
      </div>
    </div>
  </div>

  <script src="../../node_modules/monaco-editor/min/vs/loader.js"></script>
  <script src="../../node_modules/@xterm/xterm/lib/xterm.js"></script>
  <script src="monaco-lsp-client.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
